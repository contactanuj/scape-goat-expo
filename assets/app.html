<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0f14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Scape Goat</title>
  <style>
/* styles.css — Scape Goat pass-and-play. Heist / barnyard-noir: deep slate + gold. */
:root {
  --bg: #0c0f14;
  --panel: #151a22;
  --panel2: #1d242e;
  --line: #2c3540;
  --text: #e7ecf2;
  --muted: #8b97a6;
  --gold: #d9a441;
  --gold-dim: #5a4a22;
  --ok: #4a9d6a;
  --danger: #d05a48;
  --accent: #4a8fd0;
  /* player colour swatches (public identities — NOT secret roles) */
  --c-red: #e0584b;
  --c-blue: #4a8fd0;
  --c-green: #57b069;
  --c-yellow: #e3c34a;
  --c-purple: #a06fd0;
  --c-orange: #e08a3c;
  --c-pink: #e07fb0;
  --c-teal: #3fb5ad;
  --c-grey: #8b97a6;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  font-size: 16px;
  line-height: 1.4;
  -webkit-user-select: none; user-select: none;
}
/* Safe-area aware so the status bar / notch / home-indicator never overlaps content.
   Android: StatusBar translucent={false} reserves the bar; iOS: env() insets (viewport-fit=cover). */
#app {
  max-width: 600px; margin: 0 auto; min-height: 100%;
  padding-top: max(16px, env(safe-area-inset-top));
  padding-right: max(16px, env(safe-area-inset-right));
  padding-bottom: max(44px, env(safe-area-inset-bottom));
  padding-left: max(16px, env(safe-area-inset-left));
}

h1, h2, h3 { margin: 0 0 10px; font-weight: 700; letter-spacing: 0.2px; }
h1 { font-size: 30px; color: var(--gold); letter-spacing: 1px; }
h2 { font-size: 21px; }
h3 { font-size: 15px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
p { margin: 0 0 10px; }
.muted { color: var(--muted); }
.center { text-align: center; }
.small { font-size: 13px; }
.tiny { font-size: 11px; }
.spacer { height: 14px; }
b.gold { color: var(--gold); }

.panel { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 16px; margin-bottom: 14px; }
.panel.tight { padding: 12px; }

.btn {
  display: block; width: 100%; padding: 15px 16px; margin: 8px 0;
  border: 1px solid var(--line); border-radius: 12px;
  background: var(--panel2); color: var(--text);
  font-size: 17px; font-weight: 600; text-align: center; cursor: pointer;
}
.btn:active { transform: translateY(1px); }
.btn.primary { background: var(--gold); color: #1a1408; border-color: var(--gold); }
.btn.go { background: var(--ok); border-color: var(--ok); color: #fff; }
.btn.danger { background: var(--danger); border-color: var(--danger); color: #fff; }
.btn.ghost { background: transparent; }
.btn:disabled { opacity: 0.4; cursor: default; }
.btn.sm { padding: 10px 12px; font-size: 15px; width: auto; display: inline-block; margin: 4px; }

.row { display: flex; gap: 10px; align-items: center; }
.row.wrap { flex-wrap: wrap; }
.grow { flex: 1; }

label { display: block; font-size: 13px; color: var(--muted); margin: 10px 0 4px; }
input[type=text] {
  width: 100%; padding: 12px; border-radius: 10px;
  border: 1px solid var(--line); background: #0a0d12; color: var(--text); font-size: 16px;
}
select {
  width: 100%; padding: 11px; border-radius: 10px;
  border: 1px solid var(--line); background: #0a0d12; color: var(--text); font-size: 15px;
}

/* number stepper */
.stepper { display: flex; align-items: center; gap: 0; }
.stepper button {
  width: 46px; height: 46px; font-size: 22px; font-weight: 700;
  background: var(--panel2); color: var(--text); border: 1px solid var(--line); cursor: pointer;
}
.stepper button:first-child { border-radius: 10px 0 0 10px; }
.stepper button:last-child { border-radius: 0 10px 10px 0; }
.stepper .val { min-width: 56px; text-align: center; font-size: 19px; font-weight: 700;
  border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); height: 46px; line-height: 46px; background: #0a0d12; }

.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.topbar .title { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.iconbtn { background: var(--panel2); border: 1px solid var(--line); color: var(--text); border-radius: 10px; padding: 8px 12px; font-size: 14px; cursor: pointer; }

.note { border-left: 3px solid var(--gold); padding: 8px 12px; background: var(--panel2); border-radius: 8px; margin: 8px 0; font-size: 14px; }
.err { border-left: 3px solid var(--danger); padding: 7px 12px; background: #2a1310; border-radius: 8px; margin: 6px 0; font-size: 14px; color: #f0b8b0; }
.warn { border-left: 3px solid var(--gold); padding: 7px 12px; background: #28230f; border-radius: 8px; margin: 6px 0; font-size: 14px; color: #e6d39a; }

.kv { display: flex; justify-content: space-between; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--line); }
.kv:last-child { border-bottom: none; }
.collapse-h { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }

/* colour swatches (PUBLIC identity, never a secret role) */
.swatch { display: inline-block; width: 16px; height: 16px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.25); vertical-align: middle; }
.swatch.lg { width: 26px; height: 26px; }
.sw-red { background: var(--c-red); } .sw-blue { background: var(--c-blue); }
.sw-green { background: var(--c-green); } .sw-yellow { background: var(--c-yellow); }
.sw-purple { background: var(--c-purple); } .sw-orange { background: var(--c-orange); }
.sw-pink { background: var(--c-pink); } .sw-teal { background: var(--c-teal); }
.sw-grey { background: var(--c-grey); }

/* board strip — the line of locations with tokens (public) */
.board { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0 8px; }
.loc {
  flex: 1 0 86px; min-width: 86px; border: 1px solid var(--line); border-radius: 10px;
  background: var(--panel2); padding: 8px 6px; text-align: center; position: relative;
}
.loc.here { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold) inset; }
.loc.cops { background: #241115; border-color: #6b2b30; }
.loc.flipped { background: #241a0c; border-color: var(--gold-dim); }
.loc .lname { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); font-weight: 700; }
.loc .lsub { font-size: 9px; color: var(--gold); margin-top: 2px; min-height: 11px; }
.loc .toks { display: flex; flex-wrap: wrap; gap: 3px; justify-content: center; margin-top: 6px; min-height: 16px; }
.loc .faceup-mini { margin-top: 6px; }

/* roster — players with public colour, location, hand count, tokens */
.roster { display: flex; flex-direction: column; gap: 6px; }
.prow { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 10px; background: var(--panel2); border: 1px solid var(--line); }
.prow.turn { border-color: var(--gold); }
.prow .pname { flex: 1; font-weight: 600; }
.prow .pmeta { font-size: 12px; color: var(--muted); }
.prow .ptok { font-size: 12px; color: var(--gold); }
.chip { font-size: 11px; padding: 2px 8px; border-radius: 20px; border: 1px solid var(--line); color: var(--muted); }
.chip.turn { background: var(--gold); color: #1a1408; border-color: var(--gold); }

/* evidence cards */
.cards-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 12px 0; }
.ecard {
  width: 96px; border-radius: 12px; border: 2px solid var(--line); background: #11161d;
  padding: 10px 8px; text-align: center; cursor: pointer; position: relative;
}
.ecard.pick:active { border-color: var(--gold); }
.ecard.sel { border-color: var(--gold); box-shadow: 0 0 0 2px var(--gold) inset; }
.ecard.dim { opacity: 0.35; }
.ecard .portraits { display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; min-height: 28px; align-items: center; }
.ecard .pdot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.25); }
.ecard .elabel { font-size: 10px; color: var(--muted); margin-top: 8px; min-height: 12px; }
.ecard .eback { font-size: 24px; color: var(--gold); }
.ecard.back { background: repeating-linear-gradient(45deg, #161c24, #161c24 6px, #1b222b 6px, #1b222b 12px); }
.ecard.mini { width: 60px; padding: 6px 4px; }
.ecard.mini .pdot { width: 14px; height: 14px; }

/* intel / role card (private; identical look for everyone — no role tell) */
.intelcard { border-radius: 16px; padding: 22px 18px; text-align: center; margin: 10px 0; border: 2px solid var(--gold-dim); background: #1a1810; }
.intelcard .big { font-size: 26px; font-weight: 800; margin: 6px 0; color: var(--gold); }

/* pass-the-device handoff gate */
.pass-screen { text-align: center; padding: 30px 10px; }
.pass-screen .who { font-size: 30px; font-weight: 800; color: var(--gold); margin: 10px 0; }

/* winner banner */
.banner { text-align: center; padding: 22px; border-radius: 16px; margin-bottom: 14px; border: 2px solid; }
.banner.scapegoat { background: #241115; border-color: var(--danger); }
.banner.conspirators { background: #14233a; border-color: var(--accent); }
.banner h1 { margin: 0; }

.log-list { font-size: 13px; color: var(--muted); }
.log-list .li { padding: 5px 0; border-bottom: 1px solid var(--line); }
.hidden { display: none; }

.steps { counter-reset: s; }
.steps .step { position: relative; padding: 6px 0 6px 30px; font-size: 14px; }
.steps .step::before { counter-increment: s; content: counter(s); position: absolute; left: 0; top: 6px;
  width: 20px; height: 20px; border-radius: 50%; background: var(--gold); color: #1a1408; font-weight: 700; font-size: 12px; text-align: center; line-height: 20px; }

  </style>
</head>
<body>
  <div id="app"></div>
  <script>
/*
 * sg-deck.js — deterministic evidence-deck synthesis for Scape Goat.
 *
 * Scape Goat has a CLOSED card economy: every card is dealt at setup (no draw
 * pile), and every action is a 1-for-1 swap, so the total never changes:
 *
 *     deckSize = N*handSize + 4 faceup (one per evidence location) + stashSize
 *
 * Each EVIDENCE CARD shows zero or more player COLORS (portraits) and may show a
 * grey "innocent bystander" (no player's colour). To FRAME a target, every one of
 * the N-1 other players must simultaneously hold a card bearing the target's
 * colour — so the deck MUST contain at least N-1 cards of every colour, otherwise
 * that player can never be framed (and if they are the scapegoat, the conspirators
 * literally cannot win). This module guarantees that floor BY CONSTRUCTION.
 *
 * The physical game ships 30 hand-curated cards filtered by player count; the exact
 * list isn't published, so we SYNTHESIZE a balanced, count-appropriate deck instead
 * (and scale to off-spec counts). Deterministic given (config, seed): composition is
 * pure; only the deal order is shuffled with the game's seeded PRNG.
 *
 * Pattern mirrors chameleon-expo/assets/ch-content.js: a self-contained UMD data
 * module with no DOM and no image assets (colours are string ids; an illustrated
 * set can be dropped in later purely at the render layer).
 */
(function (root, factory) {
  var SGDeck = factory();
  if (typeof module !== 'undefined' && module.exports) module.exports = SGDeck;
  if (root) root.SGDeck = SGDeck;
})(typeof window !== 'undefined' ? window : (typeof globalThis !== 'undefined' ? globalThis : this), function () {
  'use strict';

  // Same mulberry32 PRNG the engine uses, operating on the shared state.rngState,
  // so deck shuffles interleave deterministically with the rest of the game.
  function nextRand(state) {
    var t = (state.rngState = (state.rngState + 0x6D2B79F5) >>> 0);
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  }
  function shuffleInPlace(state, arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(nextRand(state) * (i + 1));
      var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }

  // The four evidence locations that each hold one face-up card (Go-to-Cops has none).
  var FACEUP_LOCATIONS = ['prepare', 'spy', 'trade', 'stash'];

  var DECK_PRESETS = ['scarce', 'balanced', 'rich', 'chaos', 'custom'];

  // Preset -> deck-shape knobs. `custom` reads the explicit fields off config.deck.
  function presetKnobs(config) {
    var d = config.deck || {};
    switch (d.preset) {
      case 'scarce':   return { spare: 0, greyFraction: 0.12, maxColors: 2 };
      case 'rich':     return { spare: 2, greyFraction: 0.20, maxColors: 2 };
      case 'chaos':    return { spare: 2, greyFraction: 0.20, maxColors: 3 };
      case 'custom':   return {
        spare: clampInt(d.spare, 0, 6, 1),
        greyFraction: clampNum(d.greyFraction, 0, 0.5, 0.16),
        maxColors: clampInt(d.maxColorsPerCard, 1, 3, 2)
      };
      case 'balanced':
      default:         return { spare: 1, greyFraction: 0.16, maxColors: 2 };
    }
  }

  function clampInt(v, lo, hi, dflt) {
    v = (v == null || isNaN(v)) ? dflt : Math.round(v);
    return Math.max(lo, Math.min(hi, v));
  }
  function clampNum(v, lo, hi, dflt) {
    v = (v == null || isNaN(v)) ? dflt : v;
    return Math.max(lo, Math.min(hi, v));
  }

  function deckSizeFor(config) {
    var N = config.playerCount;
    var H = config.handSize;
    var stash = config.stashSize;
    return N * H + FACEUP_LOCATIONS.length + stash;
  }

  // Effective per-card colour cap: never enough colours to implicate >= N-1 players
  // on a single card (that would auto-frame someone every reveal).
  function effectiveMaxColors(config, knobs) {
    var N = config.playerCount;
    var cap = knobs.maxColors;
    if (!(config.deck && config.deck.allowThreeColor)) cap = Math.min(cap, 2);
    return Math.max(1, Math.min(cap, N - 1));
  }

  // ---------------------------------------------------------------------------
  // composeDeck(config) -> { cards:[{id,colors:[],hasBystander}], stats }
  //
  // Pure & deterministic (no PRNG). `cards` is the UNSHUFFLED multiset. stats lets
  // validateConfig reason about feasibility without re-deriving the math.
  // ---------------------------------------------------------------------------
  function composeDeck(config) {
    var N = config.playerCount;
    var colors = config.playerColors.slice(0, N);
    var knobs = presetKnobs(config);
    var maxColors = effectiveMaxColors(config, knobs);

    var deckSize = deckSizeFor(config);
    var floorIncidence = N * (N - 1);            // hard minimum total colour incidence
    var maxIncidence = deckSize * maxColors;     // most colour we can pack in

    var feasible = floorIncidence <= maxIncidence;

    // Desired total incidence (sweet spot), never below the floor, never above capacity.
    var targetPerColor = (N - 1) + knobs.spare;
    var goalIncidence = Math.min(Math.max(N * targetPerColor, floorIncidence), maxIncidence);

    if (!feasible) {
      // Caller (validateConfig) turns this into a blocking error. Return a best-effort
      // all-colour deck so nothing downstream throws on a bad config preview.
      goalIncidence = maxIncidence;
    }

    // Decide grey-only card count g0 within the range that keeps the rest legal:
    //   every coloured card needs >=1 colour  => g0 >= deckSize - goalIncidence
    //   coloured cards can hold <= maxColors   => g0 <= deckSize - ceil(goal/maxColors)
    var lo = Math.max(0, deckSize - goalIncidence);
    var hi = deckSize - Math.ceil(goalIncidence / maxColors);
    if (hi < lo) hi = lo;
    var desiredGrey = Math.round(deckSize * knobs.greyFraction);
    var g0 = Math.max(lo, Math.min(hi, Math.round(desiredGrey * 0.5)));

    var R = deckSize - g0;                       // coloured cards (>=1 colour each)
    // Distribute "bumps" (extra colours beyond the first) across the R coloured cards.
    var extra = goalIncidence - R;               // total extra colours to place
    if (extra < 0) extra = 0;
    var perCardCap = maxColors - 1;              // max bumps a single card can take

    var colorCount = [];                         // colours on each coloured card (1..maxColors)
    var i;
    for (i = 0; i < R; i++) colorCount.push(1);
    var idx = 0, guard = 0;
    while (extra > 0 && guard++ < R * maxColors + 5) {
      if (colorCount[idx] - 1 < perCardCap) { colorCount[idx]++; extra--; }
      idx = (idx + 1) % R;
    }

    // Even per-colour demand whose sum == actual incidence (>= floor for every colour).
    var actualIncidence = 0;
    for (i = 0; i < R; i++) actualIncidence += colorCount[i];
    var demand = [];
    var base = Math.floor(actualIncidence / N);
    var rem = actualIncidence - base * N;
    for (i = 0; i < N; i++) demand.push(base + (i < rem ? 1 : 0));

    // Assign concrete colours: cards needing the most colours pick first, each taking
    // the highest-remaining-demand DISTINCT colours. Keeps every colour near its demand.
    var order = [];
    for (i = 0; i < R; i++) order.push(i);
    order.sort(function (a, b) { return colorCount[b] - colorCount[a]; });

    var cards = [];
    var nextId = 0;
    function mkId() { return 'sg-card-' + (nextId++); }

    for (var oi = 0; oi < order.length; oi++) {
      var need = colorCount[order[oi]];
      var chosen = pickTopDistinct(demand, need);
      var cc = [];
      for (var k = 0; k < chosen.length; k++) { cc.push(colors[chosen[k]]); demand[chosen[k]]--; }
      cards.push({ id: mkId(), colors: cc, hasBystander: false });
    }

    // Grey-mixed flavour: tag some single-colour cards with a bystander, then add the
    // grey-only cards. Total grey ~= greyFraction of the deck (room permitting).
    var greyMixBudget = Math.max(0, desiredGrey - g0);
    var mixed = 0;
    for (i = 0; i < cards.length && mixed < greyMixBudget; i++) {
      if (cards[i].colors.length === 1) { cards[i].hasBystander = true; mixed++; }
    }
    for (i = 0; i < g0; i++) cards.push({ id: mkId(), colors: [], hasBystander: true });

    // Safety net: if integer rounding starved a colour below the N-1 floor, repair by
    // grafting it onto a card that can take another colour (prefer grey-only -> single).
    repairFloor(cards, colors, N, maxColors);

    return { cards: cards, stats: deckStats(cards, colors, N, deckSize, feasible) };
  }

  // Pick `k` distinct colour indices with the highest remaining demand (ties by index).
  function pickTopDistinct(demand, k) {
    var idxs = [];
    for (var i = 0; i < demand.length; i++) idxs.push(i);
    idxs.sort(function (a, b) { return demand[b] - demand[a] || a - b; });
    return idxs.slice(0, k);
  }

  function repairFloor(cards, colors, N, maxColors) {
    var guard = 0;
    while (guard++ < N * 4) {
      var inc = colorIncidence(cards);
      var starved = null;
      for (var c = 0; c < colors.length; c++) {
        if ((inc[colors[c]] || 0) < N - 1) { starved = colors[c]; break; }
      }
      if (!starved) return;
      // Prefer turning a grey-only card into a single of the starved colour.
      var done = false;
      for (var i = 0; i < cards.length; i++) {
        if (cards[i].colors.length === 0) { cards[i].colors.push(starved); done = true; break; }
      }
      if (done) continue;
      // Otherwise add it to any card with spare colour capacity not already showing it.
      for (var j = 0; j < cards.length; j++) {
        if (cards[j].colors.length < maxColors && cards[j].colors.indexOf(starved) === -1) {
          cards[j].colors.push(starved); done = true; break;
        }
      }
      if (!done) return; // genuinely infeasible (validateConfig will have errored already)
    }
  }

  function cardHasColor(card, color) { return card.colors.indexOf(color) !== -1; }

  function colorIncidence(cards) {
    var out = {};
    for (var i = 0; i < cards.length; i++) {
      for (var k = 0; k < cards[i].colors.length; k++) {
        var c = cards[i].colors[k];
        out[c] = (out[c] || 0) + 1;
      }
    }
    return out;
  }

  function deckStats(cards, colors, N, deckSize, feasible) {
    var inc = colorIncidence(cards);
    var minInc = Infinity, maxInc = 0, grey = 0, singles = 0, pairs = 0, triples = 0;
    for (var c = 0; c < colors.length; c++) {
      var v = inc[colors[c]] || 0;
      if (v < minInc) minInc = v;
      if (v > maxInc) maxInc = v;
    }
    for (var i = 0; i < cards.length; i++) {
      if (cards[i].hasBystander && cards[i].colors.length === 0) grey++;
      var len = cards[i].colors.length;
      if (len === 1) singles++; else if (len === 2) pairs++; else if (len >= 3) triples++;
    }
    return {
      deckSize: deckSize,
      feasible: feasible,
      incidence: inc,
      minIncidence: (minInc === Infinity ? 0 : minInc),
      maxIncidence: maxInc,
      floor: N - 1,
      greyCards: grey,
      singles: singles,
      pairs: pairs,
      triples: triples
    };
  }

  // synthesizeDeck(config, state) -> shuffled array of card objects.
  // Uses the game's seeded PRNG (state.rngState) so the deal order replays.
  function synthesizeDeck(config, state) {
    var composed = composeDeck(config);
    var cards = composed.cards.map(function (c) {
      return { id: c.id, colors: c.colors.slice(), hasBystander: c.hasBystander };
    });
    return shuffleInPlace(state, cards);
  }

  function frameFeasible(stats, N) { return stats.minIncidence >= (N - 1); }

  return {
    FACEUP_LOCATIONS: FACEUP_LOCATIONS,
    DECK_PRESETS: DECK_PRESETS,
    presetKnobs: presetKnobs,
    effectiveMaxColors: effectiveMaxColors,
    deckSizeFor: deckSizeFor,
    composeDeck: composeDeck,
    synthesizeDeck: synthesizeDeck,
    colorIncidence: colorIncidence,
    cardHasColor: cardHasColor,
    frameFeasible: frameFeasible
  };
});

  </script>
  <script>
/*
 * sg-engine.js — Scape Goat rules engine (pure, transport-agnostic).
 *
 * No DOM, no network. Deterministic given (config, seed), so it can be:
 *   - unit-tested in Node by simulating full games (tests/engine.test.js),
 *   - inlined into the pass-and-play app.html (this APK),
 *   - reused verbatim by a future "Scape Goat Online" build.

    var bestC = null, best = 0, second = 0;
    for (var i = 0; i < cols.length; i++) {
      var v = seen[cols[i]] || 0;
      if (v > best) { second = best; best = v; bestC = cols[i]; }
      else if (v > second) { second = v; }
    }
    return { color: bestC, count: best, second: second };
  }

  // ---- core judgement: am I the patsy? -----------------------------------
  // Reads ONLY memory + own colour/suspect — NOT state.scapegoatId.
  function dangerLevel(state, id) { var t = topColor(state, id); return t.color === ownColor(state, id) ? t.count : 0; }
  function wantsCops(state, id) {
    var t = topColor(state, id);
    if (t.color !== ownColor(state, id)) return false; // my colour isn't the most-hoarded -> not the patsy
    // Require SUSTAINED evidence (count>=3 takes several spies under the 0.75 decay) so a single
    // lucky spy of a 2-of-my-colour hand can't trigger an early panic. Loosen only when it's late.
    if (t.count >= 3 && t.count >= 1.5 * t.second) return true;
    if (state.round >= 10 && t.count >= 2 && t.count >= 1.2 * t.second) return true;
    if (state.round >= 16 && t.count >= 1.5) return true; // dragging heist: if my colour leads at all, bolt
    return false;
  }
  // Confident the gang is collecting my suspect's colour (we're aligned) -> spring the frame.
  // Looser than the cops bar so the gang actually acts; the scapegoat's top colour is its OWN,
  // never its decoy, so this never fires for the scapegoat.
  function readyToFrame(state, id) {
    var t = topColor(state, id);
    return t.color === suspectColor(state, id) && t.count >= 2;
  }

  // ---- card-preference tiers (lower = more willing to give away) ---------
  function tierGive(state, id, cid) { // trade / face-up swap: shed grey first, keep suspect colour
    var own = ownColor(state, id), sus = suspectColor(state, id), d = def(state, cid);
    if (d.colors.indexOf(sus) !== -1) return 4;            // keep — needed to frame
    if (d.colors.length === 0) return 0;                   // grey-only: safest to give
    if (d.colors.indexOf(own) !== -1) return 3;            // own colour: avoid arming others
    return 1;                                              // neutral coloured
  }
  function tierStashReturn(state, id, cid) { // facedown: hide your OWN colour first
    var own = ownColor(state, id), sus = suspectColor(state, id), d = def(state, cid);
    if (d.colors.indexOf(sus) !== -1) return 4;
    if (d.colors.indexOf(own) !== -1) return 0;            // bury own colour out of sight
    if (d.colors.length === 0) return 1;
    return 2;
  }
  function bestToGive(state, id, cards, tierFn, target) {
    var best = null, bestTier = 1e9;
    for (var i = 0; i < cards.length; i++) {
      var t = tierFn(state, id, cards[i], target);
      if (t < bestTier) { bestTier = t; best = cards[i]; }
    }
    return best;
  }

  // ---- decisions ---------------------------------------------------------
  function botMove(state, id) {
    var p = me(state, id);
    var targets = SG.eligibleMoveTargets(state);
    function can(loc) { return targets.indexOf(loc) !== -1; }
    var nonCops = targets.filter(function (l) { return l !== 'cops'; });

    if (wantsCops(state, id) && can('cops')) return 'cops';

    var flipped = state.prepFlipped;
    var hasToken = p.prepTokens > 0;
    var sus = suspectColor(state, id);
    var hasSuspect = handHasColor(state, id, sus);
    var ready = readyToFrame(state, id);
    // Impatience: the longer the heist runs, the more willing a token-holder is to just spring
    // the frame even unconfirmed, so games converge instead of circling forever.
    var urgency = state.round;

    // ready to frame: token + a suspect-colour card + (confirmed, or just impatient enough)
    if (flipped && hasToken && hasSuspect && (ready || urgency >= 6) && can('prepare')) return 'prepare';
    // have a token but not yet confident -> Spy to verify others hold the suspect colour
    if (flipped && hasToken && !ready && can('spy') && brand(state) < 0.7) return 'spy';
    // no token but want one: steal occasionally
    if (flipped && !hasToken && SG.eligibleStealTargets(state).length && can('prepare') && brand(state) < 0.3) return 'prepare';
    // pre-flip: take a token / push the flip
    if (!flipped && state.prepTokensRemaining > 0 && can('prepare') && brand(state) < 0.45) return 'prepare';
    // need the suspect's colour: draw from the stash or trade for it
    if (!hasSuspect) {
      if (can('stash') && brand(state) < 0.6) return 'stash';
      if (can('trade') && brand(state) < 0.6) return 'trade';
    }
    // gather intel: who holds my colour (danger) and who holds the suspect's (frame-readiness)
    if (can('spy') && brand(state) < 0.55) return 'spy';
    return pick(state, nonCops.length ? nonCops : targets);
  }

  function botSpyTarget(state, id) {
    var others = state.players.filter(function (q) { return q.id !== id; });
    return pick(state, others).id;
  }
  function botTradePartner(state, id) {
    var others = state.players.filter(function (q) { return q.id !== id; });
    return pick(state, others).id;
  }
  function botTradeGiveCard(state, id) { return bestToGive(state, id, me(state, id).hand.slice(), tierGive); }
  function botStashTakeIndex(state, id) { return ri(state, state.stash.length); }
  function botStashReturnCard(state, id) { return bestToGive(state, id, me(state, id).hand.slice(), tierStashReturn); }
  function botFrameTargetColor(state, id) { return suspectColor(state, id); }
  function botStealVictim(state, id) { return pick(state, SG.eligibleStealTargets(state)); }

  // The colour the bot is trying to push in a frame: the publicly-declared target if
  // any (everyone hears it), otherwise its own suspicion.
  function frameTarget(state, id) {
    return (state.frame && state.frame.declaredColor) ? state.frame.declaredColor : suspectColor(state, id);
  }
  function botFrameCard(state, id) {
    var own = ownColor(state, id), target = frameTarget(state, id);
    var hand = me(state, id).hand, best = hand[0], bestTier = 1e9;
    for (var i = 0; i < hand.length; i++) {
      var d = def(state, hand[i]);
      var hasT = d.colors.indexOf(target) !== -1, hasOwn = d.colors.indexOf(own) !== -1;
      var t = hasT && !hasOwn ? 0 : (hasT && hasOwn ? 1 : (!hasT && !hasOwn ? 2 : 3));
      if (t < bestTier) { bestTier = t; best = hand[i]; }
    }
    return best;
  }
  function botEvidenceSwapCard(state, id) {
    var elig = SG.eligibleSwapOutCards(state, id); // engine restricts to own-colour when mustShed
    return bestToGive(state, id, elig.slice(), tierGive);
  }

  // ---- one engine step for the CURRENT (single-actor) bot phase ----------
  // Returns true if it performed an action. Multi-actor phases (frame_select,
  // action_trade_select) are orchestrated by the caller using the per-player picks.
  function takeAction(state, id) {
    switch (state.phase) {
      case 'movement': SG.move(state, botMove(state, id)); return true;
      case 'action_spy': SG.spy(state, botSpyTarget(state, id)); afterSpy(state, id); return true;
      case 'action_spy_view': SG.spyDone(state); return true;
      case 'action_trade': SG.tradeBegin(state, botTradePartner(state, id)); return true;
      case 'action_stash': SG.stashTake(state, botStashTakeIndex(state, id)); return true;
      case 'action_stash_return': SG.stashReturn(state, botStashReturnCard(state, id)); return true;
      case 'action_prepare': SG.prepare(state); return true;
      case 'action_framesteal': {
        var p = me(state, id);
        if (p.prepTokens >= 1) {
          if (state.config.frameMode === 'declared_target') SG.frameInitiate(state, botFrameTargetColor(state, id));
          else SG.frameInitiate(state);
        } else { SG.steal(state, botStealVictim(state, id)); }
        return true;
      }
      case 'action_cops': SG.goToCops(state); return true;
      case 'frame_resolve': SG.frameAcknowledge(state); return true;
      case 'evidence_swap': SG.evidenceSwap(state, botEvidenceSwapCard(state, id)); return true;
      default: return false;
    }
  }

  return {
    // decisions
    botMove: botMove,
    botSpyTarget: botSpyTarget,
    botTradePartner: botTradePartner,
    botTradeGiveCard: botTradeGiveCard,
    botStashTakeIndex: botStashTakeIndex,
    botStashReturnCard: botStashReturnCard,
    botFrameTargetColor: botFrameTargetColor,
    botFrameCard: botFrameCard,
    botStealVictim: botStealVictim,
    botEvidenceSwapCard: botEvidenceSwapCard,
    wantsCops: wantsCops,
    dangerLevel: dangerLevel,
    readyToFrame: readyToFrame,
    // observation hooks
    afterSpy: afterSpy,
    afterFrameReveal: afterFrameReveal,
    // one-step driver
    takeAction: takeAction
  };
});

  </script>
  <script>
/*
 * ui.js — pass-and-play UI for Scape Goat. Browser-only (uses the DOM).
 * Depends on window.SG (engine) and window.SGDeck, inlined before this by build.js.
 *
 * HIDDEN-INFO DISCIPLINE (the wink-killer lesson):
 *   - Shared/board screens render ONLY SG.publicState(G): token positions, face-up
 *     cards, hand COUNTS, prep tokens, whose turn. Player colours are PUBLIC identity
 *     swatches, never a role tell. Nothing here distinguishes the scapegoat.
 *   - Secret info (a player's hand; their "intel"/suspect) is shown ONLY behind a
 *     "pass the device to X" gate, and the intel/role-reveal screen looks IDENTICAL
 *     for the scapegoat and the conspirators (same as SG.revealInfo's flat shape).
 *   - There is deliberately NO "review everyone's roles" screen.
 */
(function () {
  'use strict';
  var SG = window.SG;
  var SGBot = window.SGBot;
  var app = document.getElementById('app');
  var KEY = 'sg_state_v1';

  var G = null;        // engine game state (or null)
  var draft = null;    // setup config being edited
  var view = 'home';   // 'home' | 'setup' | 'rules' | 'game' | 'log'
  var ui = {};         // transient per-screen UI state
  var autoEnabled = (typeof setTimeout === 'function'); // bot auto-play timer (off in headless tests)
  var BOT_DELAY = 850; // ms between visible bot steps
  var botTimer = null;
  var lastScreenKey = null; // only scroll-to-top on a real screen change, not in-place updates
  var revealTimer = null;   // countdown that auto-hides a private reveal (wink-killer style)

  // ---- timed private reveal (always on; auto-hides the secret so it can't linger) --------
  function autoHideSecs() { return (G && G.config && G.config.autoHideSeconds) || 7; }
  function stopCountdown() { if (revealTimer) { clearInterval(revealTimer); revealTimer = null; } }
  function startCountdown() {
    stopCountdown();
    ui.hidden = false;
    ui.countdown = autoHideSecs();
    if (!autoEnabled || typeof setInterval !== 'function') return; // headless tests: no timer
    revealTimer = setInterval(function () {
      ui.countdown--;
      if (ui.countdown <= 0) { ui.hidden = true; stopCountdown(); }
      render();
    }, 1000);
  }

  // ---- persistence -------------------------------------------------------
  function save() { try { if (G) localStorage.setItem(KEY, JSON.stringify(G)); } catch (e) {} }
  function loadSaved() { try { var s = localStorage.getItem(KEY); return s ? JSON.parse(s) : null; } catch (e) { return null; } }
  function clearSaved() { try { localStorage.removeItem(KEY); } catch (e) {} }

  // ---- helpers -----------------------------------------------------------
  function esc(s) {
    return ('' + (s == null ? '' : s)).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function seed() { return ((Date.now() >>> 0) ^ Math.floor(Math.random() * 0xffffffff)) >>> 0; }
  function nameOf(id) { return G ? SG.nameOf(G, id) : '?'; }
  function colorOf(id) { return G ? SG.colorOf(G, id) : null; }
  function swatch(color, lg) { return '<span class="swatch ' + (lg ? 'lg ' : '') + 'sw-' + esc(color) + '"></span>'; }
  function locLabel(loc) { return { prepare: 'Prepare', spy: 'Spy', trade: 'Trade', stash: 'Stash', cops: 'Cops' }[loc] || loc; }

  function setUiPhase() {
    if (ui.phase !== G.phase) {
      ui.phase = G.phase;
      ui.gate = true;            // most cross-player private screens start gated
      ui.peekShown = false;
      ui.spyShown = false;
      ui.swapShown = false;
      ui.tradeStep = 'initiator';
      ui.tradeGate = true;
      ui.frameIdx = 0;
      ui.frameGate = true;
      ui.selCard = null;
      ui.frameTarget = null;
    }
  }

  // ===========================================================================
  // RENDER DISPATCH
  // ===========================================================================
  function render() {
    if (view === 'game' && G) setUiPhase();
    var html;
    if (view === 'home') html = renderHome();
    else if (view === 'setup') html = renderSetup();
    else if (view === 'rules') html = renderRules();
    else if (view === 'log') html = renderLog();
    else if (view === 'game') html = renderGame();
    else html = renderHome();
    // Safety: stop the auto-hide timer whenever a live private reveal isn't on screen.
    var showingSecret = view === 'game' && G && !ui.hidden && (
      (G.phase === 'reveal' && ui.revealShown && ui.revealIdx < G.players.length) ||
      (G.phase === 'movement' && ui.peekShown));
    if (revealTimer && !showingSecret) stopCountdown();

    app.innerHTML = html;
    // Only jump to the top on a real screen change — not on in-place updates (typing a
    // name, tapping a stepper/toggle/select in Setup), which would otherwise yank the
    // page back to the top mid-edit.
    var key = screenKey();
    if (key !== lastScreenKey) {
      app.scrollTop = 0;
      if (window.scrollTo) window.scrollTo(0, 0);
      lastScreenKey = key;
    }
    scheduleBots();
  }

  // A stable id for "which screen am I on" — re-renders that keep this key keep the scroll.
  function screenKey() {
    if (view !== 'game' || !G) return view;
    return ['game', G.phase, G.currentPlayerId,
      ui.revealIntro ? 'i' : '', ui.revealIdx || 0, ui.revealShown ? 'rs' : '',
      ui.peekShown ? 'pk' : '', ui.spyShown ? 'sy' : '', ui.swapShown ? 'sw' : '',
      ui.frameIdx || 0, ui.frameGate ? 'fg' : '', ui.tradeStep || ''
    ].join('|');
  }

  // ===========================================================================
  // HOME
  // ===========================================================================
  function renderHome() {
    var saved = loadSaved();
    var resume = (saved && saved.phase !== 'game_over')
      ? '<button class="btn primary" data-action="resume">Resume game (' + esc(saved.players.length) + ' players)</button>'
      : '';
    return [
      '<div class="center" style="padding-top:26px">',
      '<h1>SCAPE GOAT</h1>',
      '<p class="muted">Pass-and-play · one device · 3–8 players</p>',
      '</div>',
      '<div class="spacer"></div>',
      resume,
      '<button class="btn primary" data-action="newgame">New game</button>',
      '<button class="btn" data-action="rules">How to play</button>',
      '<div class="spacer"></div>',
      '<p class="small muted center">You pulled off the heist of the century — but the cops are coming and someone has to take the fall. Frame the scapegoat… unless the scapegoat is <i>you</i>, in which case run to the cops!</p>',
      '<p class="small muted center">This app privately deals everyone their evidence and their belief about who the scapegoat is, runs the board, and resolves frames — you bring the table talk, bluffs and winks.</p>'
    ].join('');
  }

  // ===========================================================================
  // SETUP + CONFIG (live validation)
  // ===========================================================================
  // Seed `pc` flavourful, distinct names — keeping any already entered, padding the rest
  // from a shuffled "Gruff Gang" pool (falls back to "Player N" if the pool runs out).
  function themedNames(pc, existing) {
    existing = (existing || []).slice(0, pc);
    var used = {}; existing.forEach(function (n) { used[('' + n).trim().toLowerCase()] = true; });
    var pool = SG.THEME_NAMES.slice();
    for (var i = pool.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = pool[i]; pool[i] = pool[j]; pool[j] = t; }
    var out = existing.slice(), p = 0;
    while (out.length < pc) {
      if (p < pool.length) { var nm = pool[p++]; if (!used[nm.toLowerCase()]) { out.push(nm); used[nm.toLowerCase()] = true; } }
      else out.push('Player ' + (out.length + 1));
    }
    return out;
  }
  function newDraft(pc) {
    var names = (draft && draft.playerNames) ? draft.playerNames.slice() : null;
    var d = SG.defaultConfig(pc, names);
    if (!names) d.playerNames = themedNames(pc, []); // fresh New-game setup gets fun, varied names
    return d;
  }
  function resizeNames(d) {
    if (d.playerNames.length < d.playerCount) d.playerNames = themedNames(d.playerCount, d.playerNames);
    d.playerNames.length = d.playerCount;
    d.playerColors = SG.defaultColors(d.playerCount);
    if (!d.playerKinds) d.playerKinds = SG.defaultKinds(d.playerCount);
    while (d.playerKinds.length < d.playerCount) d.playerKinds.push('human');
    d.playerKinds.length = d.playerCount;
  }

  function renderSetup() {
    if (!draft) draft = newDraft(5);
    resizeNames(draft);
    var v = SG.validateConfig(draft);
    var adv = !!ui.advanced;

    var nameInputs = draft.playerNames.map(function (n, i) {
      var isBot = draft.playerKinds[i] === 'bot';
      return '<div class="row" style="margin:6px 0">' + swatch(draft.playerColors[i]) +
        '<input class="grow" type="text" data-name-idx="' + i + '" value="' + esc(n) + '" placeholder="Player ' + (i + 1) + '" maxlength="16" />' +
        '<button class="iconbtn" data-kind-idx="' + i + '">' + (isBot ? '🤖 Bot' : '🧑 Human') + '</button></div>';
    }).join('');

    return [
      topbar('New game', '<button class="iconbtn" data-action="home">Cancel</button>'),
      '<div class="panel">',
      '<h3>Players</h3>',
      stepperRow('Number of players', 'playerCount', draft.playerCount, 3, 8),
      '<label>Names &amp; colours (seating order)</label>',
      nameInputs,
      '</div>',

      '<div class="panel">',
      '<div class="collapse-h" data-action="toggleAdvanced"><h3 style="margin:0">Advanced configuration</h3><span class="iconbtn">' + (adv ? 'Hide ▲' : 'Show ▼') + '</span></div>',
      adv ? renderAdvanced(draft) : '<p class="small muted" style="margin-top:8px">Defaults match the official game for ' + draft.playerCount + ' players. Tap to tune the deck, frame style, scoring and house rules — invalid combos are blocked, off-spec ones are warned.</p>',
      '</div>',

      renderValidation(v),
      '<button class="btn primary" data-action="startGame"' + (v.ok ? '' : ' disabled') + '>' +
        (v.ok ? 'Deal the evidence &amp; start' : 'Fix the issue' + (v.errors.length > 1 ? 's' : '') + ' above to start') + '</button>',
      '<button class="btn ghost" data-action="resetDefaults">Reset to defaults</button>'

  }

  // Smallest hand size that still lets the synthesized deck make every player frameable
